            {(() => {

                  const groupLabel = group.find(g => g.groupLabel)?.groupLabel || "Shared deliverable";

                  // Collect all comments for tasks in this group + group-level comments
                  // Group comments stored as item_type='task', item_id='group:<groupId>' to satisfy DB constraint
                  const groupComments = comments[`task-group:${t.groupId}`] || [];
                  const allTaskComments = {};
                  group.forEach(g => { allTaskComments[g.id] = comments[`task-${g.id}`] || []; });

                        <td colSpan={3} style={{ padding:0, borderBottom:"1px solid #F1F5F9" }}>

                                    onMouseLeave={() => setHoveredTask(null)}
                                    style={{
                                      display:"flex", alignItems:"center", justifyContent:"space-between",
                                      padding:"6px 0",
                                      borderTop: gi > 0 ? "1px solid #F1F5F9" : "none",
                                      background: hoveredTask === g.id ? "#FAFBFF" : "transparent",

                                    <div style={{ display:"flex", alignItems:"center", gap:8, flex:1 }}>
                                      <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",

                            {/* Shared asset + group-level note — one for the whole group */}
                            {(() => {
                              const groupFeedbackKey = `task-group:${t.groupId}`;
                              const totalGroupComments = groupComments.length + group.reduce((sum, g) => sum + (allTaskComments[g.id] || []).length, 0);
                              const groupResp = feedbackResponses[groupFeedbackKey];
                              const groupFs = groupResp ? FEEDBACK_STATUS[groupResp.status] : null;

                                      fontFamily:"inherit" }}>
                                      {isGroupExpanded ? "▾" : "▸"} {totalGroupComments} comment{totalGroupComments !== 1 ? "s" : ""}
                                      {groupFs && (
                                        <span style={{ fontSize:10, fontWeight:600, color: groupFs.color,
                                          background: groupFs.bg, padding:"1px 6px", borderRadius:3, marginLeft:4 }}>
                                          {groupFs.icon} {groupFs.label}
                                        </span>
                                      )}
                                    </button>
                                  )}
                                  {/* Show status badge even if no toggle needed */}
                                  {totalGroupComments === 0 && groupFs && (
                                    <span style={{ fontSize:10, fontWeight:600, color: groupFs.color,
                                      background: groupFs.bg, padding:"2px 8px", borderRadius:4,
                                      display:"inline-flex", alignItems:"center", gap:4 }}>
                                      {groupFs.icon} {groupFs.label}
                                    </span>

                                    {/* Group-level comments */}
                                    {groupComments.map((c, ci) => (
                                      <div key={`gc-${ci}`} style={{ marginTop: 6, padding:"6px 0",
                                        borderTop: ci > 0 ? "1px solid #F1F5F9" : "none" }}>
                                        <span style={{ fontSize:12, color:"#64748B" }}>
                                          💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>

                                          {c.body}
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                </>
                              );
                            })()}

                            {/* Group-level comment panel */}
                            {isGroupPanelOpen && (

                                      fontFamily:"inherit", color:"#1E293B" }} />
                                    <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                                    <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                      placeholder="Overall feedback on this deliverable..." rows={2}

                                        headers: {

                                          'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                                          'Content-Type': 'application/json',
                                          'Prefer': 'return=representation',

                                        body: JSON.stringify({
                                          project_slug: window.PROJECT_SLUG,

                                          item_id: `group:${t.groupId}`,

                                </div>
                              </div>

                        </td>

                    </React.Fragment>

                  return;

                const s = STATUS[t.status]; const p = PRIORITY[t.priority];

                const assetKey = t.assetPath ? `task-asset:${t.id}` : null;

                const isPanelOpen   = openPanel === t.id;
                const isAssetPanelOpen = openPanel === `asset-${t.id}`;
                const totalCommentCount = taskComments.length + assetComments.length;
                const commentSectionKey = assetKey || `task-${t.id}`;
                const isCommentsExpanded = expandedComments.has(commentSectionKey);
                const assetResp = assetKey ? feedbackResponses[assetKey] : null;
                const assetFs = assetResp ? FEEDBACK_STATUS[assetResp.status] : null;
                const hasBelowContent = isCommentsExpanded || isPanelOpen || isAssetPanelOpen;

                rows.push(
                  <React.Fragment key={t.id}>
                    <tr
                      onMouseEnter={() => setHoveredTask(t.id)}
                      onMouseLeave={() => setHoveredTask(null)}
                      style={{ background: hoveredTask === t.id ? '#FAFBFF' : 'white' }}
                    >
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                          <div style={{ display:"flex", alignItems:"flex-start", gap:9, flex:1 }}>
                            <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                              background:s.dot, marginTop:4, flexShrink:0 }} />
                            <div>
                              <div style={{ fontSize:13, color:t.status==="done"?"#94A3B8":"#1E293B",
                                textDecoration:t.status==="done"?"line-through":"none", lineHeight:1.5 }}>
                                {t.text}
                              </div>
                              {t.assetPath && (
                                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:5, flexWrap:"wrap" }}>
                                  <button onClick={() => openAsset(t.assetPath)} style={{
                                    background:"none", border:`1px solid ${BRAND}`,
                                    borderRadius:5, padding:"2px 9px", fontSize:11, color:BRAND,
                                    cursor:"pointer", fontFamily:"inherit",
                                    display:"inline-flex", alignItems:"center", gap:5,
                                    textDecoration:"none" }}>
                                    {!viewedAssets.has(t.assetPath) && (
                                      <span style={{ background:BRAND, color:"white", fontSize:9,
                                        fontWeight:700, borderRadius:3, padding:"1px 5px",
                                        letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                                    )}
                                    View asset →
                                  </button>
                                  {!isAssetPanelOpen && (
                                    <button onClick={() => openComment(`asset-${t.id}`)} style={{
                                      background:"none", border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      💬 Feedback
                                    </button>
                                  )}
                                  {/* Collapsible feedback toggle */}
                                  {totalCommentCount > 0 && (
                                    <button onClick={() => toggleCommentSection(commentSectionKey)} style={{
                                      background: isCommentsExpanded ? "#F1F5F9" : "none",
                                      border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      {isCommentsExpanded ? "▾" : "▸"} {totalCommentCount} comment{totalCommentCount !== 1 ? "s" : ""}
                                      {assetFs && (
                                        <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                          background: assetFs.bg, padding:"1px 6px", borderRadius:3, marginLeft:2 }}>
                                          {assetFs.icon} {assetFs.label}
                                        </span>
                                      )}
                                    </button>
                                  )}
                                  {totalCommentCount === 0 && assetFs && (
                                    <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                      background: assetFs.bg, padding:"2px 8px", borderRadius:4,
                                      display:"inline-flex", alignItems:"center", gap:4 }}>
                                      {assetFs.icon} {assetFs.label}
                                    </span>
                                  )}
                                </div>
                              )}
                              {t.blocker && <div style={{ fontSize:11, color:"#DC2626", marginTop:3 }}>⚠ {t.blocker}</div>}
                            </div>
                          </div>
                          {hoveredTask === t.id && !isPanelOpen && !t.assetPath && (
                            <button onClick={() => openComment(t.id)} style={{
                              background:"none", border:"1px solid #E2E8F0", borderRadius:4,
                              padding:"2px 8px", fontSize:11, color:"#64748B", cursor:"pointer",
                              display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap", flexShrink:0,
                              fontFamily:"inherit" }}>
                              💬 Note
                            </button>
                          )}
                          {hoveredTask === t.id && !isPanelOpen && t.assetPath && (
                            <button onClick={() => openComment(t.id)} style={{
                              background:"none", border:"1px solid #E2E8F0", borderRadius:4,
                              padding:"2px 8px", fontSize:11, color:"#64748B", cursor:"pointer",
                              display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap", flexShrink:0,
                              fontFamily:"inherit" }}>
                              💬 Note on task
                            </button>
                          )}
                        </div>
                      </td>
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>
                        <Badge color={p.color} bg={p.bg}>{p.label}</Badge>
                      </td>
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>
                        <Badge color={s.badgeText} bg={s.badge}>{s.label}</Badge>
                      </td>
                    </tr>

                    {/* Task-level comment panel */}
                    {isPanelOpen && (
                      <tr>
                        <td colSpan={3} style={{
                          padding:"0 16px 12px 44px",
                          borderBottom: (taskComments.length > 0 || assetComments.length > 0) ? "none" : "1px solid #F1F5F9",
                          background:"#F8FAFC" }}>
                          <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"14px 16px" }}>
                            <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>
                              Leave a note on: <strong style={{ color:"#374151" }}>"{t.text}"</strong>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                              <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                placeholder="e.g. Jason" style={{ fontSize:13, padding:"6px 10px",
                                border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                fontFamily:"inherit", color:"#1E293B" }} />
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                              <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                placeholder="Type your note here..." rows={2}
                                style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit", resize:"vertical", color:"#1E293B" }} />
                            </div>
                            {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:12 }}>
                              <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                              <button onClick={() => submitComment(t)} disabled={!canSend} style={{
                                fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                fontFamily:"inherit", fontWeight:600,
                                cursor: canSend ? "pointer" : "not-allowed",
                                background: canSend ? BRAND : "#E2E8F0",
                                color: canSend ? "white" : "#94A3B8" }}>
                                {panelLoading ? 'Sending...' : 'Send →'}
                              </button>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}

                    {/* Asset feedback panel */}
                    {isAssetPanelOpen && (
                      <tr>
                        <td colSpan={3} style={{
                          padding:"0 16px 12px 44px",
                          borderBottom: (taskComments.length > 0 || assetComments.length > 0) ? "none" : "1px solid #F1F5F9",
                          background:"#F8FAFC" }}>
                          <div style={{ background:"white", border:`1px solid ${BRAND}33`, borderRadius:8, padding:"14px 16px" }}>
                            <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>
                              Feedback on asset: <strong style={{ color:BRAND }}>"{t.text}"</strong>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                              <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                placeholder="e.g. Jason" style={{ fontSize:13, padding:"6px 10px",
                                border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                fontFamily:"inherit", color:"#1E293B" }} />
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Feedback</label>
                              <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                placeholder="What do you think of this deliverable?" rows={2}
                                style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit", resize:"vertical", color:"#1E293B" }} />
                            </div>
                            {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:12 }}>
                              <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                              <button onClick={() => {
                                setPanelLoading(true); setPanelError('');
                                fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
                                  method: 'POST',
                                  headers: {
                                    'apikey': window.SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json',
                                    'Prefer': 'return=representation',
                                  },
                                  body: JSON.stringify({
                                    project_slug: window.PROJECT_SLUG,
                                    item_type: 'task',
                                    item_id: `asset:${t.id}`,
                                    item_text: t.text,
                                    commenter_name: panelName.trim(),
                                    body: panelBody.trim(),
                                  }),
                                })
                                .then(res => { if (!res.ok) throw new Error(`Error ${res.status}`); return res.json(); })
                                .then(([nc]) => { onCommentAdded(nc); closePanel(); })
                                .catch(() => { setPanelError('Something went wrong — please try again.'); })
                                .finally(() => setPanelLoading(false));
                              }} disabled={!canSend} style={{
                                fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                fontFamily:"inherit", fontWeight:600,
                                cursor: canSend ? "pointer" : "not-allowed",
                                background: canSend ? BRAND : "#E2E8F0",
                                color: canSend ? "white" : "#94A3B8" }}>
                                {panelLoading ? 'Sending...' : 'Send Feedback →'}
                              </button>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}

                    {/* Collapsible comments section */}
                    {isCommentsExpanded && (taskComments.length > 0 || assetComments.length > 0) && (
                      <tr>
                        <td colSpan={3} style={{
                          padding: "4px 16px 10px 44px",
                          borderBottom: "1px solid #F1F5F9",
                          background:"#F8FAFC" }}>
                          <div style={{ padding:"10px 12px", background:"#FAFBFF",
                            borderRadius:8, border:"1px solid #E2E8F0" }}>
                            {/* Feedback response banner */}
                            {assetKey && <FeedbackResponseBanner feedbackKey={assetKey} feedbackResponses={feedbackResponses} />}

                            {/* Task comments */}
                            {taskComments.map((c, ci) => (
                              <div key={`c-${ci}`} style={{ marginTop: 6, padding:"6px 0",
                                borderTop: ci > 0 ? "1px solid #F1F5F9" : "none" }}>
                                <span style={{ fontSize:12, color:"#64748B" }}>
                                  💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>
                                  , {formatDate(c.created_at)}
                                </span>
                                <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                  {c.body}
                                </div>
                              </div>
                            ))}

                            {/* Asset feedback comments */}
                            {assetComments.map((c, ci) => (
                              <div key={`ac-${ci}`} style={{ marginTop: 6, padding:"6px 0",
                                borderTop: (ci > 0 || taskComments.length > 0) ? "1px solid #F1F5F9" : "none" }}>
                                <span style={{ fontSize:12, color:"#64748B" }}>
                                  🎨 <strong style={{ color:BRAND, fontWeight:600 }}>{c.commenter_name}</strong>
                                  , {formatDate(c.created_at)}
                                </span>
                                <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                  {c.body}
                                </div>
                              </div>
                            ))}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              });

              return rows;
            })()}
          </tbody>
        </table>
        </>
      );
    }

    const REACTIONS = [
      { key:'agree',    emoji:'👍', label:'Agreed',   defaultBody:'Agreed'   },
      { key:'question', emoji:'❓', label:'Question',  defaultBody:'Question' },
      { key:'concern',  emoji:'⚠️', label:'Concern',  defaultBody:'Concern'  },
    ];

    function DecisionRow({ dec, index, comments, onCommentAdded }) {
      const [selected, setSelected] = useState(null);
      const [name, setName]         = useState('');
      const [note, setNote]         = useState('');
      const [error, setError]       = useState('');
      const [loading, setLoading]   = useState(false);

      const decComments = comments[`decision-${index}`] || [];
      const counts = { agree:0, question:0, concern:0 };
      decComments.forEach(c => { if (c.reaction) counts[c.reaction]++; });
      const notes = decComments.filter(c => !REACTIONS.map(r=>r.defaultBody).includes(c.body));

      function pickReaction(key) {
        setSelected(key === selected ? null : key);
        setName(''); setNote(''); setError('');
      }

      async function submitReaction() {
        setLoading(true); setError('');
        const r = REACTIONS.find(r => r.key === selected);
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'decision',
              item_id: String(index),
              item_text: dec.title,
              commenter_name: name.trim(),
              body: note.trim() || r.defaultBody,
              reaction: selected,
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setSelected(null); setName(''); setNote('');
        } catch(e) {
          setError('Something went wrong — please try again.');
          console.error('Reaction submit failed:', e);
        } finally {
          setLoading(false);
        }
      }

      const canConfirm = name.trim() && !loading;

      return (
        <div style={{ borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"grid", gridTemplateColumns:"130px 1fr", padding:"16px 18px", gap:16 }}>
            <span style={{ fontSize:12, color:"#94A3B8", paddingTop:1 }}>{dec.date}</span>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:"#0F172A", marginBottom:4 }}>{dec.title}</div>
              <div style={{ fontSize:12, color:"#64748B", lineHeight:1.6, marginBottom:12 }}>{dec.detail}</div>

              {/* Notes from reactions that included custom text */}
              {notes.map((c, ci) => (
                <div key={ci} style={{ fontSize:12, color:"#64748B", marginBottom:6 }}>
                  {REACTIONS.find(r=>r.key===c.reaction)?.emoji || '💬'}{' '}
                  <strong style={{ color:"#374151" }}>{c.commenter_name}</strong>
                  , {formatDate(c.created_at)} · "{c.body}"
                </div>
              ))}

              {/* Reaction buttons */}
              <div style={{ display:"flex", gap:8, marginTop: notes.length ? 10 : 0 }}>
                {REACTIONS.map(r => {
                  const isActive = selected === r.key;
                  return (
                    <button key={r.key} onClick={() => pickReaction(r.key)} style={{
                      fontSize:12, padding:"5px 12px", borderRadius:6, fontFamily:"inherit",
                      border: isActive ? `1px solid ${BRAND}` : '1px solid #E2E8F0',
                      background: isActive ? '#ECFDF5' : 'white',
                      color: isActive ? BRAND : '#374151',
                      fontWeight: isActive ? 600 : 400,
                      cursor:"pointer", transition:"all .1s" }}>
                      {r.emoji} {r.label}{counts[r.key] > 0 ? ` (${counts[r.key]})` : ''}
                    </button>
                  );
                })}
              </div>

              {/* Confirm form — appears when a reaction is selected */}
              {selected && (
                <div style={{ marginTop:10, padding:"12px 14px", background:"#F8FAFC",
                  borderRadius:8, border:"1px solid #E2E8F0" }}>
                  <div style={{ fontSize:12, color:"#64748B", marginBottom:8 }}>
                    {REACTIONS.find(r=>r.key===selected).emoji} {REACTIONS.find(r=>r.key===selected).label} — confirm your name and add an optional note
                  </div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <input
                      value={name}
                      onChange={e => setName(e.target.value)}
                      placeholder="Your name"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", width:160 }}
                    />
                    <input
                      value={note}
                      onChange={e => setNote(e.target.value)}
                      placeholder="Add a note (optional)"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", flex:1, minWidth:160 }}
                    />
                  </div>
                  {error && <div style={{ fontSize:12, color:"#DC2626", marginTop:6 }}>⚠ {error}</div>}
                  <div style={{ display:"flex", gap:8, marginTop:8 }}>
                    <button onClick={() => { setSelected(null); setName(''); setNote(''); }} style={{
                      fontSize:12, padding:"5px 12px", border:"1px solid #E2E8F0",
                      borderRadius:6, background:"white", color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>
                      Cancel
                    </button>
                    <button onClick={submitReaction} disabled={!canConfirm} style={{
                      fontSize:12, padding:"5px 12px", border:"none", borderRadius:6,
                      fontFamily:"inherit", fontWeight:600,
                      cursor: canConfirm ? "pointer" : "not-allowed",
                      background: canConfirm ? BRAND : "#E2E8F0",
                      color: canConfirm ? "white" : "#94A3B8" }}>
                      {loading ? 'Submitting...' : 'Confirm →'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function QuestionRow({ item, index, comments, onCommentAdded }) {
      const [name, setName]       = useState('');
      const [answer, setAnswer]   = useState('');
      const [files, setFiles]     = useState([]);
      const [error, setError]     = useState('');
      const [loading, setLoading] = useState(false);

      const u = URGENCY[item.urgency];
      const qKey = `question-${item.id || index}`;
      const qComments = comments[qKey] || [];
      const canSubmit = name.trim() && (answer.trim() || files.length > 0) && !loading;

      function addFile(fileInfo) {
        setFiles(prev => [...prev, fileInfo]);
      }

      function parseBody(rawBody) {
        const filePattern = /\[FILE(?:_PENDING)?:([^|]+)\|([^|]*)\|?(\d*)\]/g;
        const textBody = rawBody.replace(filePattern, '').trim();
        const attachedFiles = [];
        let match;
        while ((match = filePattern.exec(rawBody)) !== null) {
          const isPending = match[0].startsWith('[FILE_PENDING');
          attachedFiles.push({
            name: match[1],
            url: isPending ? null : match[2],
            size: parseInt(match[3]) || 0,
            uploadPending: isPending,
          });
        }
        return { textBody, attachedFiles };
      }

      async function submitAnswer() {
        setLoading(true); setError('');
        try {
          let fullBody = answer.trim();
          if (files.length > 0) {
            const fileRefs = files.map(f => {
              if (f.url) return `[FILE:${f.name}|${f.url}|${f.size}]`;
              return `[FILE_PENDING:${f.name}|${f.size}]`;
            }).join('\n');
            fullBody = fullBody ? `${fullBody}\n\n${fileRefs}` : fileRefs;
          }

          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'question',
              item_id: item.id || String(index),
              item_text: item.q,
              commenter_name: name.trim(),
              body: fullBody,
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setName(''); setAnswer(''); setFiles([]);
        } catch(e) {
          setError('Something went wrong — please try again.');
          console.error('Answer submit failed:', e);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div style={{ borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", padding:"16px 18px", gap:14, alignItems:"start" }}>
            <Badge color={u.color} bg={u.bg}>{u.label}</Badge>
            <div>
              <div style={{ fontSize:13, color:"#0F172A", fontWeight:500, marginBottom:4 }}>{item.q}</div>
              <div style={{ fontSize:12, color:"#64748B", lineHeight:1.5, marginBottom:12 }}>{item.note}</div>

              {/* Existing answers — with file attachment support */}
              {qComments.map((c, ci) => {
                const { textBody, attachedFiles } = parseBody(c.body);
                return (
                  <div key={ci} style={{ fontSize:12, marginBottom:10, padding:"10px 12px",
                    background:"#F8FAFC", borderRadius:6, borderLeft:`2px solid ${BRAND}` }}>
                    <span style={{ color:"#94A3B8" }}>
                      <strong style={{ color:"#374151" }}>{c.commenter_name}</strong>, {formatDate(c.created_at)}
                    </span>
                    {textBody && (
                      <div style={{ marginTop:4, color:"#1E293B", lineHeight:1.6, fontSize:13 }}>{textBody}</div>
                    )}
                    {attachedFiles.length > 0 && (
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:6 }}>
                        {attachedFiles.map((f, fi) => (
                          <FileAttachment key={fi} file={f} />
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Answer form */}
              <textarea
                value={answer}
                onChange={e => setAnswer(e.target.value)}
                placeholder="Type your answer here, or attach a document..."
                rows={2}
                style={{ width:"100%", fontSize:13, padding:"8px 10px", border:"1px solid #E2E8F0",
                  borderRadius:6, outline:"none", fontFamily:"inherit", resize:"vertical",
                  color:"#1E293B", marginBottom:8, display:"block" }}
              />

              {/* Attached files preview */}
              {files.length > 0 && (
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
                  {files.map((f, fi) => (
                    <div key={fi} style={{ display:"flex", alignItems:"center", gap:4 }}>
                      <FileAttachment file={f} />
                      <button onClick={() => setFiles(prev => prev.filter((_, idx) => idx !== fi))}
                        style={{ background:"none", border:"none", cursor:"pointer",
                          fontSize:12, color:"#94A3B8", padding:2 }}>✕</button>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <input
                  value={name}
                  onChange={e => setName(e.target.value)}
                  placeholder="Your name"
                  style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                    borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", width:140 }}
                />
                <FileUploadButton onFileUploaded={addFile} label="Attach doc" compact={true} />
                <button onClick={submitAnswer} disabled={!canSubmit} style={{
                  fontSize:12, padding:"6px 16px", border:"none", borderRadius:6,
                  fontFamily:"inherit", fontWeight:600,
                  cursor: canSubmit ? "pointer" : "not-allowed",
                  background: canSubmit ? BRAND : "#E2E8F0",
                  color: canSubmit ? "white" : "#94A3B8",
                  marginLeft:"auto" }}>
                  {loading ? 'Submitting...' : 'Submit Answer →'}
                </button>
                {error && <span style={{ fontSize:12, color:"#DC2626" }}>⚠ {error}</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── File Upload helper ── */
    function FileUploadButton({ onFileUploaded, label = "Attach file", compact = false }) {
      const [uploading, setUploading] = useState(false);
      const [error, setError] = useState('');
      const fileRef = React.useRef(null);

      async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const maxSize = 10 * 1024 * 1024; // 10MB
        if (file.size > maxSize) { setError('File too large (max 10MB)'); return; }
        setUploading(true); setError('');

        try {
          const ext = file.name.split('.').pop();
          const path = `${window.PROJECT_SLUG}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
          const res = await fetch(
            `${window.SUPABASE_URL}/storage/v1/object/project-files/${path}`,
            {
              method: 'POST',
              headers: {
                'apikey': window.SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                'Content-Type': file.type || 'application/octet-stream',
              },
              body: file,
            }
          );
          if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
          const publicUrl = `${window.SUPABASE_URL}/storage/v1/object/public/project-files/${path}`;
          onFileUploaded({
            name: file.name,
            size: file.size,
            type: file.type,
            url: publicUrl,
            path: path,
          });
        } catch (err) {
          console.error('Upload error:', err);
          setError('Upload failed — storage bucket may need setup. File name recorded.');
          // Even if upload fails, record the file reference so Cowork knows about it
          onFileUploaded({
            name: file.name,
            size: file.size,
            type: file.type,
            url: null,
            path: null,
            uploadPending: true,
          });
        } finally {
          setUploading(false);
          if (fileRef.current) fileRef.current.value = '';
        }
      }

      const FILE_ICONS = {
        'pdf': '📄', 'doc': '📝', 'docx': '📝', 'xls': '📊', 'xlsx': '📊',
        'png': '🖼', 'jpg': '🖼', 'jpeg': '🖼', 'gif': '🖼',
        'csv': '📊', 'txt': '📃', 'mp4': '🎬', 'mov': '🎬',
      };

      return (
        <div style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <input ref={fileRef} type="file" onChange={handleFile} style={{ display:"none" }}
            accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.png,.jpg,.jpeg,.gif,.mp4,.mov" />
          <button onClick={() => fileRef.current?.click()} disabled={uploading}
            style={{
              background:"none", border:"1px solid #E2E8F0", borderRadius:compact ? 4 : 6,
              padding: compact ? "2px 8px" : "5px 12px",
              fontSize: compact ? 11 : 12, color:"#64748B", cursor: uploading ? "wait" : "pointer",
              display:"inline-flex", alignItems:"center", gap:4,
              fontFamily:"inherit" }}>
            {uploading ? '⏳ Uploading...' : `📎 ${label}`}
          </button>
          {error && <span style={{ fontSize:10, color:"#D97706" }}>{error}</span>}
        </div>
      );
    }

    function FileAttachment({ file }) {
      if (!file) return null;
      const ext = file.name.split('.').pop().toLowerCase();
      const icons = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊',
        png:'🖼', jpg:'🖼', jpeg:'🖼', csv:'📊', txt:'📃' };
      const icon = icons[ext] || '📎';
      const sizeStr = file.size > 1024*1024
        ? `${(file.size/(1024*1024)).toFixed(1)} MB`
        : `${Math.round(file.size/1024)} KB`;

      return (
        <div style={{ display:"inline-flex", alignItems:"center", gap:6,
          background:"#F1F5F9", borderRadius:6, padding:"4px 10px", fontSize:11 }}>
          <span>{icon}</span>
          {file.url ? (
            <a href={file.url} target="_blank" rel="noreferrer"
              style={{ color:BRAND, textDecoration:"none", fontWeight:500 }}>
              {file.name}
            </a>
          ) : (
            <span style={{ color:"#374151", fontWeight:500 }}>{file.name}</span>
          )}
          <span style={{ color:"#94A3B8" }}>({sizeStr})</span>
          {file.uploadPending && (
            <span style={{ fontSize:9, color:"#D97706", fontWeight:600 }}>PENDING</span>
          )}
        </div>
      );
    }

    /* ── Context Message (freeform inbox) ── */
    function ContextInbox({ comments, onCommentAdded }) {
      const [isOpen, setIsOpen] = useState(false);
      const [name, setName] = useState('');
      const [body, setBody] = useState('');
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      // Filter context messages from comments
      const contextMessages = (comments['context-general'] || []);
      const unacknowledged = contextMessages.filter(c => !c.reaction);

      function addFile(fileInfo) {
        setFiles(prev => [...prev, fileInfo]);
      }

      async function sendMessage() {
        if (!name.trim() || (!body.trim() && files.length === 0)) return;
        setLoading(true); setError('');
        try {
          // Build body with file references
          let fullBody = body.trim();
          if (files.length > 0) {
            const fileRefs = files.map(f => {
              if (f.url) return `[FILE:${f.name}|${f.url}|${f.size}]`;
              return `[FILE_PENDING:${f.name}|${f.size}]`;
            }).join('\n');
            fullBody = fullBody ? `${fullBody}\n\n${fileRefs}` : fileRefs;
          }

          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'context',
              item_id: 'general',
              item_text: 'Context message',
              commenter_name: name.trim(),
              body: fullBody,
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setBody(''); setFiles([]);
        } catch (e) {
          setError('Something went wrong — please try again.');
          console.error('Context send failed:', e);
        } finally {
          setLoading(false);
        }
      }

      function parseBody(rawBody) {
        // Extract file references from body
        const filePattern = /\[FILE(?:_PENDING)?:([^|]+)\|([^|]*)\|?(\d*)\]/g;
        const textBody = rawBody.replace(filePattern, '').trim();
        const attachedFiles = [];
        let match;
        while ((match = filePattern.exec(rawBody)) !== null) {
          const isPending = match[0].startsWith('[FILE_PENDING');
          attachedFiles.push({
            name: match[1],
            url: isPending ? null : match[2],
            size: parseInt(match[3]) || 0,
            uploadPending: isPending,
          });
        }
        return { textBody, attachedFiles };
      }

      const canSend = name.trim() && (body.trim() || files.length > 0) && !loading;

      return (
        <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
          overflow:"hidden", marginBottom:16 }}>
          {/* Header */}
          <button onClick={() => setIsOpen(!isOpen)} style={{
            width:"100%", padding:"12px 18px", background:"white", border:"none",
            cursor:"pointer", fontFamily:"inherit", textAlign:"left",
            display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:12, color:"#64748B" }}>{isOpen ? "▾" : "▸"}</span>
              <span style={{ fontSize:16 }}>💬</span>
              <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>
                Message the Team
              </span>
              {contextMessages.length > 0 && (
                <span style={{ fontSize:11, color:"#94A3B8" }}>
                  {contextMessages.length} message{contextMessages.length !== 1 ? "s" : ""}
                </span>
              )}
            </div>
            {unacknowledged.length > 0 && (
              <span style={{ background:BRAND, color:"white", fontSize:10,
                fontWeight:700, borderRadius:10, padding:"2px 8px", minWidth:18,
                textAlign:"center" }}>{unacknowledged.length}</span>
            )}
          </button>

          {/* Expanded content */}
          {isOpen && (
            <div style={{ borderTop:"1px solid #F1F5F9" }}>
              {/* Triage summary bar */}
              {contextMessages.length > 0 && (() => {
                const triageCounts = { t1:0, t2:0, t3:0, t4:0, unprocessed:0 };
                contextMessages.forEach(m => {
                  if (m.reaction === 't1-mvp-critical') triageCounts.t1++;
                  else if (m.reaction === 't2-enhancement') triageCounts.t2++;
                  else if (m.reaction === 't3-new-feature') triageCounts.t3++;
                  else if (m.reaction === 't4-context') triageCounts.t4++;
                  else triageCounts.unprocessed++;
                });
                const items = [
                  triageCounts.t1 > 0 && { dot:'🔴', label:'Critical', n:triageCounts.t1 },
                  triageCounts.t2 > 0 && { dot:'🟡', label:'Enhancement', n:triageCounts.t2 },
                  triageCounts.t3 > 0 && { dot:'🔵', label:'New Feature', n:triageCounts.t3 },
                  triageCounts.t4 > 0 && { dot:'⚪', label:'Context', n:triageCounts.t4 },
                  triageCounts.unprocessed > 0 && { dot:'⏳', label:'Pending Review', n:triageCounts.unprocessed },
                ].filter(Boolean);
                if (items.length === 0) return null;
                return (
                  <div style={{ display:"flex", gap:12, padding:"8px 18px",
                    background:"#FAFBFC", borderBottom:"1px solid #F1F5F9", flexWrap:"wrap" }}>
                    {items.map((item, idx) => (
                      <span key={idx} style={{ fontSize:11, color:"#64748B" }}>
                        {item.dot} {item.n} {item.label}
                      </span>
                    ))}
                  </div>
                );
              })()}

              {/* Message thread */}
              {contextMessages.length > 0 && (
                <div style={{ maxHeight:280, overflowY:"auto", padding:"12px 18px" }}>
                  {contextMessages.map((msg, i) => {
                    const { textBody, attachedFiles } = parseBody(msg.body);
                    const isAck = msg.reaction === 'acknowledged';

                    // Triage classification from system processing
                    const triageMap = {
                      't1-mvp-critical': { label:'MVP-Critical', color:'#DC2626', bg:'#FEF2F2', dot:'🔴', border:'#FCA5A5' },
                      't2-enhancement':  { label:'Enhancement',  color:'#D97706', bg:'#FFFBEB', dot:'🟡', border:'#FCD34D' },
                      't3-new-feature':  { label:'New Feature — Queued', color:'#2563EB', bg:'#EFF6FF', dot:'🔵', border:'#93C5FD' },
                      't4-context':      { label:'Context Noted', color:'#6B7280', bg:'#F9FAFB', dot:'⚪', border:'#D1D5DB' },
                    };
                    const triage = msg.reaction && triageMap[msg.reaction] ? triageMap[msg.reaction] : null;
                    const borderColor = triage ? triage.border : (isAck ? "#059669" : BRAND);

                    return (
                      <div key={i} style={{
                        padding:"10px 14px", marginBottom:8,
                        background: triage ? triage.bg : "#F8FAFC", borderRadius:8,
                        borderLeft: `3px solid ${borderColor}` }}>
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                          marginBottom: textBody ? 4 : 0, flexWrap:"wrap", gap:4 }}>
                          <span style={{ fontSize:12, color:"#94A3B8" }}>
                            <strong style={{ color:"#374151", fontWeight:600 }}>{msg.commenter_name}</strong>
                            {' '} · {formatDate(msg.created_at)}
                          </span>
                          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                            {triage && (
                              <span style={{ fontSize:10, fontWeight:700, color:triage.color,
                                background:"white", border:`1px solid ${triage.border}`,
                                borderRadius:10, padding:"2px 8px", whiteSpace:"nowrap" }}>
                                {triage.dot} {triage.label}
                              </span>
                            )}
                            {isAck && !triage && (
                              <Badge color="#059669" bg="#DCFCE7">✓ Acknowledged</Badge>
                            )}
                          </div>
                        </div>
                        {textBody && (
                          <div style={{ fontSize:13, color:"#1E293B", lineHeight:1.6, marginTop:4 }}>
                            {textBody}
                          </div>
                        )}
                        {attachedFiles.length > 0 && (
                          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:6 }}>
                            {attachedFiles.map((f, fi) => (
                              <FileAttachment key={fi} file={f} />
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Compose area */}
              <div style={{ padding:"14px 18px", background: contextMessages.length > 0 ? "white" : "transparent",
                borderTop: contextMessages.length > 0 ? "1px solid #F1F5F9" : "none" }}>
                <div style={{ fontSize:12, color:"#64748B", marginBottom:8,
                  background:"#F0F9FF", border:"1px solid #BAE6FD", borderRadius:8,
                  padding:"10px 14px", lineHeight:1.6 }}>
                  <strong style={{ color:"#0369A1" }}>How this works:</strong> Messages are triaged each session.
                  MVP-critical items are acted on immediately. New feature ideas are documented and assessed
                  for scope impact — never started without a deliberate prioritization decision.
                </div>
                <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                  <input value={name} onChange={e => setName(e.target.value)}
                    placeholder="Your name"
                    style={{ fontSize:13, padding:"8px 12px", border:"1px solid #E2E8F0",
                      borderRadius:8, outline:"none", fontFamily:"inherit", color:"#1E293B",
                      width:140 }} />
                </div>
                <div style={{ position:"relative" }}>
                  <textarea value={body} onChange={e => setBody(e.target.value)}
                    placeholder="Type a message, share context, or drop a file..."
                    rows={2}
                    style={{ width:"100%", fontSize:13, padding:"10px 12px", border:"1px solid #E2E8F0",
                      borderRadius:8, outline:"none", fontFamily:"inherit", resize:"vertical",
                      color:"#1E293B", display:"block" }} />
                </div>

                {/* Attached files preview */}
                {files.length > 0 && (
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
                    {files.map((f, fi) => (
                      <div key={fi} style={{ display:"flex", alignItems:"center", gap:4 }}>
                        <FileAttachment file={f} />
                        <button onClick={() => setFiles(prev => prev.filter((_, idx) => idx !== fi))}
                          style={{ background:"none", border:"none", cursor:"pointer",
                            fontSize:12, color:"#94A3B8", padding:2 }}>✕</button>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                  marginTop:10 }}>
                  <FileUploadButton onFileUploaded={addFile} label="Attach" compact={true} />
                  <button onClick={sendMessage} disabled={!canSend} style={{
                    fontSize:12, padding:"7px 18px", border:"none", borderRadius:8,
                    fontFamily:"inherit", fontWeight:600,
                    cursor: canSend ? "pointer" : "not-allowed",
                    background: canSend ? BRAND : "#E2E8F0",
                    color: canSend ? "white" : "#94A3B8" }}>
                    {loading ? 'Sending...' : 'Send →'}
                  </button>
                </div>
                {error && <div style={{ fontSize:12, color:"#DC2626", marginTop:6 }}>⚠ {error}</div>}
              </div>
            </div>
          )}
        </div>
      );
    }

    function HelixProgressModal({ pct, done, total, onClose }) {
      // Generate DNA helix path data
      const helixHeight = 320;
      const helixWidth = 120;
      const rungs = 16;
      const amplitude = 40;
      const cx = helixWidth / 2;
      const filledRungs = Math.round((pct / 100) * rungs);

      // Build two sine wave strands
      const strand1Points = [];
      const strand2Points = [];
      for (let i = 0; i <= rungs * 4; i++) {
        const t = i / (rungs * 4);
        const y = t * helixHeight;
        const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
        const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
        strand1Points.push(`${x1},${y}`);
        strand2Points.push(`${x2},${y}`);
      }

      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.75)",
          zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
          padding:32 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"linear-gradient(135deg, #0F172A 0%, #1E293B 100%)",
            borderRadius:20, width:420, overflow:"hidden",
            boxShadow:"0 32px 80px rgba(0,0,0,0.5)",
            display:"flex", flexDirection:"column", alignItems:"center",
            padding:"40px 32px 32px" }}>

            {/* Close */}
            <button onClick={onClose} style={{
              position:"absolute", top:16, right:16,
              background:"rgba(255,255,255,0.1)", border:"none", borderRadius:6,
              width:28, height:28, fontSize:14, cursor:"pointer",
              color:"#94A3B8", display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"inherit" }}>✕</button>

            {/* Title */}
            <div style={{ fontSize:10, fontWeight:700, color: BRAND, textTransform:"uppercase",
              letterSpacing:"0.15em", marginBottom:4 }}>Project Progress</div>
            <div style={{ fontSize:32, fontWeight:800, color:"white", marginBottom:2 }}>
              {pct}%
            </div>
            <div style={{ fontSize:12, color:"#94A3B8", marginBottom:28 }}>
              {done} of {total} tasks complete
            </div>

            {/* DNA Helix visualization */}
            <div style={{ position:"relative", width:helixWidth + 40, height:helixHeight + 20 }}>
              <svg width={helixWidth + 40} height={helixHeight + 20} viewBox={`-20 -10 ${helixWidth+40} ${helixHeight+20}`}>
                {/* Glow filter */}
                <defs>
                  <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                  </filter>
                  <linearGradient id="helixGrad" x1="0" y1="1" x2="0" y2="0">
                    <stop offset="0%" stopColor="#2563EB" />
                    <stop offset={`${pct}%`} stopColor="#2563EB" />
                    <stop offset={`${pct}%`} stopColor="#334155" />
                    <stop offset="100%" stopColor="#334155" />
                  </linearGradient>
                  <linearGradient id="helixGradAlt" x1="0" y1="1" x2="0" y2="0">
                    <stop offset="0%" stopColor="#7C3AED" />
                    <stop offset={`${pct}%`} stopColor="#7C3AED" />
                    <stop offset={`${pct}%`} stopColor="#334155" />
                    <stop offset="100%" stopColor="#334155" />
                  </linearGradient>
                </defs>

                {/* Rungs (horizontal connectors) */}
                {Array.from({ length: rungs }, (_, i) => {
                  const t = (i + 0.5) / rungs;
                  const y = t * helixHeight;
                  const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const filled = i < filledRungs;
                  return (
                    <line key={`rung-${i}`}
                      x1={x1} y1={y} x2={x2} y2={y}
                      stroke={filled ? "rgba(37,99,235,0.3)" : "rgba(51,65,85,0.2)"}
                      strokeWidth={2}
                      strokeDasharray={filled ? "none" : "3,3"} />
                  );
                })}

                {/* Strand 1 */}
                <polyline
                  points={strand1Points.join(' ')}
                  fill="none"
                  stroke="url(#helixGrad)"
                  strokeWidth={3}
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  filter={pct > 0 ? "url(#glow)" : "none"} />

                {/* Strand 2 */}
                <polyline
                  points={strand2Points.join(' ')}
                  fill="none"
                  stroke="url(#helixGradAlt)"
                  strokeWidth={3}
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  filter={pct > 0 ? "url(#glow)" : "none"} />

                {/* Node dots at rung intersections */}
                {Array.from({ length: rungs }, (_, i) => {
                  const t = (i + 0.5) / rungs;
                  const y = t * helixHeight;
                  const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const filled = i < filledRungs;
                  return (
                    <React.Fragment key={`nodes-${i}`}>
                      <circle cx={x1} cy={y} r={filled ? 4 : 3}
                        fill={filled ? "#2563EB" : "#334155"}
                        stroke={filled ? "#2563EB" : "none"} strokeWidth={1}
                        filter={filled ? "url(#glow)" : "none"} />
                      <circle cx={x2} cy={y} r={filled ? 4 : 3}
                        fill={filled ? "#7C3AED" : "#334155"}
                        stroke={filled ? "#7C3AED" : "none"} strokeWidth={1}
                        filter={filled ? "url(#glow)" : "none"} />
                    </React.Fragment>
                  );
                })}

                {/* Fill level line */}
                {pct > 0 && pct < 100 && (
                  <line
                    x1={-10} y1={helixHeight * (1 - pct/100)}
                    x2={helixWidth + 10} y2={helixHeight * (1 - pct/100)}
                    stroke={BRAND} strokeWidth={1} strokeDasharray="4,4" opacity={0.5} />
                )}
              </svg>
            </div>

            {/* Phase info */}
            <div style={{ display:"flex", gap:12, marginTop:20, width:"100%" }}>
              {d.phases.map((p, i) => (
                <div key={p} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ height:3, borderRadius:2, marginBottom:6,
                    background: i <= d.currentPhase ? (i < d.currentPhase ? "rgba(37,99,235,0.3)" : BRAND) : "#334155" }} />
                  <div style={{ fontSize:10, color: i === d.currentPhase ? "white" : "#64748B",
                    fontWeight: i === d.currentPhase ? 600 : 400 }}>{p}</div>
                </div>
              ))}
            </div>

            {/* Discipline breakdown */}
            <div style={{ marginTop:20, width:"100%", padding:"14px 0", borderTop:"1px solid #334155" }}>
              {d.disciplines.map(disc => {
                const dDone = disc.tasks.filter(t => t.status === "done").length;
                const dTotal = disc.tasks.length;
                const dPct = dTotal > 0 ? Math.round((dDone / dTotal) * 100) : 0;
                return (
                  <div key={disc.id} style={{ display:"flex", alignItems:"center", gap:10,
                    padding:"4px 0" }}>
                    <div style={{ width:18, height:18, borderRadius:4,
                      background: disc.color + "22", border:`1px solid ${disc.color}44`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:9, fontWeight:700, color: disc.color, flexShrink:0 }}>
                      {disc.label[0]}
                    </div>
                    <span style={{ fontSize:11, color:"#94A3B8", width:72, flexShrink:0 }}>{disc.label}</span>
                    <div style={{ flex:1, height:4, background:"#1E293B", borderRadius:2, overflow:"hidden" }}>
                      <div style={{ width:`${dPct}%`, height:"100%", background: disc.color,
                        borderRadius:2, transition:"width .5s ease" }} />
                    </div>
                    <span style={{ fontSize:10, fontWeight:600, color: disc.color, width:32,
                      textAlign:"right", flexShrink:0 }}>{dPct}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function PreviewModal({ url, title, onClose }) {
      if (!url) return null;
      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
          zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
          padding:32 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"white", borderRadius:14, width:"88vw", height:"82vh",
            maxWidth:1060, display:"flex", flexDirection:"column", overflow:"hidden",
            boxShadow:"0 32px 80px rgba(0,0,0,0.3)" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"10px 18px", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:BRAND }} />
                <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>{title || "Preview"}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <a href={url} target="_blank" rel="noreferrer" style={{
                  fontSize:11, color:BRAND, textDecoration:"none", fontWeight:500,
                  padding:"4px 10px", border:`1px solid ${BRAND}`, borderRadius:5,
                  display:"inline-flex", alignItems:"center", gap:4 }}>
                  Open in new tab ↗
                </a>
                <button onClick={onClose} style={{
                  background:"#F1F5F9", border:"none", borderRadius:6,
                  width:28, height:28, fontSize:14, cursor:"pointer",
                  color:"#64748B", display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"inherit", lineHeight:1 }}>✕</button>
              </div>
            </div>
            <iframe
              src={url}
              title={title || "Preview"}
              sandbox="allow-scripts allow-same-origin"
              style={{ flex:1, border:"none", width:"100%", display:"block" }}
            />
          </div>
        </div>
      );
    }

    function App() {
      const [sel, setSel]           = useState("product");
      const [tab, setTab]           = useState("overview");
      const [comments, setComments] = useState({});
      const [previewUrl, setPreviewUrl]     = useState(null);
      const [previewTitle, setPreviewTitle] = useState("");
      const [assetFeedbackOpen, setAssetFeedbackOpen] = useState(false);
      const [assetLibExpanded, setAssetLibExpanded] = useState(null); // asset id for expanded version history
      const [assetPreview, setAssetPreview]         = useState(null); // { url, title }
      const [showDone, setShowDone]                 = useState(false); // collapse done tasks on overview
      const [taskFilter, setTaskFilter]              = useState(null); // null = all, "done" | "in-progress" | "blocked" | "todo"
      const [showHelixModal, setShowHelixModal]      = useState(false); // DNA helix progress modal

      // Lifted from TaskTable so section headers can also read it
      const [viewedAssets, setViewedAssets] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('helix_viewed_assets_v1') || '[]')); }
        catch { return new Set(); }
      });
      function onAssetViewed(assetPath) {
        if (!viewedAssets.has(assetPath)) {
          const updated = new Set([...viewedAssets, assetPath]);
          setViewedAssets(updated);
          localStorage.setItem('helix_viewed_assets_v1', JSON.stringify([...updated]));
        }
      }
      // Returns true if a discipline has at least one unviewed asset
      function discHasNew(disc) {
        return disc.tasks.some(t =>
          (t.assetPath && !viewedAssets.has(t.assetPath)) ||
          (t.groupAsset && !viewedAssets.has(t.groupAsset))
        );
      }

      useEffect(() => {
        async function fetchComments() {
          try {
            const res = await fetch(
              `${window.SUPABASE_URL}/rest/v1/comments` +
              `?project_slug=eq.${window.PROJECT_SLUG}&order=created_at.asc`,
              { headers: {
                  'apikey': window.SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              }}
            );
            if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
            const data = await res.json();
            const grouped = {};
            data.forEach(c => {
              const key = `${c.item_type}-${c.item_id}`;
              if (!grouped[key]) grouped[key] = [];
              grouped[key].push(c);
            });
            // Inject demo triage messages if no real context messages exist
            if (!grouped['context-general'] || grouped['context-general'].length === 0) {
              grouped['context-general'] = [
                {
                  commenter_name: 'Jason',
                  body: 'The readiness check-in screen needs to show the deload button — users are confused about when deload triggers. This is blocking the wireframe v2 approval.',
                  created_at: '2026-03-08T14:22:00Z',
                  reaction: 't1-mvp-critical',
                  item_type: 'context', item_id: 'general',
                },
                {
                  commenter_name: 'Keagan',
                  body: 'Could we add a dark mode toggle to the coach dashboard? Some coaches work late nights and would appreciate it.',
                  created_at: '2026-03-08T16:45:00Z',
                  reaction: 't2-enhancement',
                  item_type: 'context', item_id: 'general',
                },
                {
                  commenter_name: 'Jason',
                  body: 'I had an idea — what if we added a social feed where athletes can see each other\'s workouts? Like a team leaderboard with streaks and badges.',
                  created_at: '2026-03-09T09:10:00Z',
                  reaction: 't3-new-feature',
                  item_type: 'context', item_id: 'general',
                },
                {
                  commenter_name: 'Hayden',
                  body: 'FYI — confirmed the domain helix.mobile is secured. App store name "Helix" is available too.',
                  created_at: '2026-03-09T11:30:00Z',
                  reaction: 't4-context',
                  item_type: 'context', item_id: 'general',
                },
              ];
            }
            setComments(grouped);
          } catch (e) {
            console.error('Comments fetch failed:', e);
          }
        }
        fetchComments();
      }, []);

      function onCommentAdded(newComment) {
        setComments(prev => {
          const key = `${newComment.item_type}-${newComment.item_id}`;
          return { ...prev, [key]: [...(prev[key] || []), newComment] };
        });
      }

      const selected  = d.disciplines.find(x => x.id === sel);
      const total     = d.disciplines.reduce((a,disc) => a + disc.tasks.length, 0);
      const done      = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="done").length, 0);
      const inProg    = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="in-progress").length, 0);
      const blocked   = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="blocked").length, 0);
      const pct       = total > 0 ? Math.round((done/total)*100) : 0;

      return (
        <div style={{ minHeight:"100vh", background:"#F8FAFC", fontFamily:"'Inter',system-ui,sans-serif" }}>

          {/* ── Shared preview modal ── */}
          <PreviewModal url={previewUrl} title={previewTitle} onClose={() => { setPreviewUrl(null); setPreviewTitle(""); }} />

          {/* ── DNA Helix progress modal ── */}
          {showHelixModal && (
            <HelixProgressModal pct={pct} done={done} total={total} onClose={() => setShowHelixModal(false)} />
          )}

          {/* ── TOP BAR ── */}
          <div style={{ background:"white", borderBottom:"1px solid #E2E8F0", padding:"0 28px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
            height:56, position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <div style={{ width:28, height:28, borderRadius:6, background:BRAND,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                    <rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                  </svg>
                </div>
                <span style={{ fontSize:14, fontWeight:700, color:"#0F172A" }}>{d.name}</span>
              </div>
              <span style={{ color:"#E2E8F0" }}>|</span>
              <div style={{ display:"flex", gap:2 }}>
                {[["overview","Overview"],["tasks","Tasks"],["decisions","Decisions"],["updates","Weekly Updates"],["questions","Open Questions"]].map(([id,label])=>(
                  <button key={id} onClick={()=>{ setTab(id); if (id !== "tasks") setTaskFilter(null); }} style={{
                    background: tab===id?"#F1F5F9":"transparent", border:"none", cursor:"pointer",
                    padding:"6px 12px", borderRadius:6, fontSize:13,
                    fontWeight: tab===id?600:400,
                    color: tab===id?"#0F172A":"#64748B", fontFamily:"inherit",
                    display:"flex", alignItems:"center", gap:6 }}>
                    {label}
                    {id==="questions" && d.openQuestions.length > 0 && (
                      <span style={{
                        background: BRAND, color:"white",
                        fontSize:10, fontWeight:700, borderRadius:10,
                        padding:"1px 6px", lineHeight:"16px", minWidth:16,
                        textAlign:"center" }}>
                        {d.openQuestions.length}
                      </span>
                    )}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ textAlign:"right" }}>
                <span style={{ fontSize:12, color:"#94A3B8" }}>Updated {d.lastUpdated}</span>
                <div style={{ fontSize:10, color:"#CBD5E1", marginTop:1 }}>
                  {(() => {
                    try {
                      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                      const tzAbbr = new Date().toLocaleTimeString('en-US', { timeZoneName:'short' }).split(' ').pop();
                      const time = d.lastUpdatedTime || new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
                      return `${time} ${tzAbbr}`;
                    } catch(e) { return ''; }
                  })()}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:6, background:"#F0FDF4",
                border:"1px solid #BBF7D0", padding:"4px 10px", borderRadius:6 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:"#059669" }} />
                <span style={{ fontSize:12, fontWeight:600, color:"#166534" }}>
                  Phase {d.currentPhase+1}: {d.phases[d.currentPhase]}
                </span>
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1100, margin:"0 auto", padding:"28px" }}>

            {/* ── OVERVIEW ── */}
            {tab==="overview" && <>

              {/* Phase bar */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                padding:"16px 20px", marginBottom:20,
                display:"flex", alignItems:"center", gap:20 }}>
                <span style={{ fontSize:11, fontWeight:600, color:"#64748B", whiteSpace:"nowrap" }}>PROJECT PHASE</span>
                <div style={{ display:"flex", flex:1, gap:8 }}>
                  {d.phases.map((p,i)=>(
                    <div key={p} style={{ flex:1 }}>
                      <div style={{ height:5, borderRadius:3,
                        background: i<=d.currentPhase ? BRAND : "#E2E8F0",
                        opacity: i<d.currentPhase?0.4:1 }} />
                      <div style={{ fontSize:11, marginTop:5,
                        color:i===d.currentPhase ? BRAND : "#94A3B8",
                        fontWeight:i===d.currentPhase?600:400 }}>{p}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Stat cards — interactive */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:20 }}>
                {[
                  { label:"Total Tasks",  value:total,     color:"#1E293B", bg:"white",   border:"#E2E8F0", filter: null },
                  { label:"Done",         value:done,      color:"#059669", bg:"#F0FDF4", border:"#BBF7D0", filter: "done" },
                  { label:"In Progress",  value:inProg,    color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE", filter: "in-progress" },
                  { label:"Blocked",      value:blocked,   color:"#DC2626", bg:"#FEF2F2", border:"#FECACA", filter: "blocked" },
                  { label:"Overall",      value:`${pct}%`, color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE", filter: "__helix__" },
                ].map(s=>(
                  <button key={s.label} onClick={() => {
                    if (s.filter === "__helix__") { setShowHelixModal(true); }
                    else { setTaskFilter(s.filter); setTab("tasks"); }
                  }} style={{ background:s.bg, border:`1px solid ${s.border}`,
                    borderRadius:10, padding:"16px 18px", cursor:"pointer",
                    fontFamily:"inherit", textAlign:"left",
                    transition:"transform .1s, box-shadow .15s",
                    outline:"none" }}
                    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 4px 12px ${s.color}18`; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
                    <div style={{ fontSize:26, fontWeight:700, color:s.color, lineHeight:1 }}>{s.value}</div>
                    <div style={{ fontSize:11, color:"#94A3B8", marginTop:5, fontWeight:500, display:"flex", alignItems:"center", gap:4 }}>
                      {s.label}
                      <span style={{ fontSize:10, color: s.color, opacity:0.5 }}>→</span>
                    </div>
                  </button>
                ))}
              </div>

              {/* ── Message the Team — freeform context inbox ── */}
              <ContextInbox comments={comments} onCommentAdded={onCommentAdded} />

              {/* Discipline chips + tasks */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                overflow:"hidden", marginBottom:16 }}>

                {/* Chips row */}
                <div style={{ padding:"10px 14px", display:"flex", gap:8, borderBottom:"1px solid #F1F5F9",
                  overflowX:"auto" }}>
